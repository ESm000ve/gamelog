<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamelog — Visual Sitemap Diagram</title>
<meta name="description" content="Standalone interactive Information Architecture sitemap diagram for the Gamelog app.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── Scoped entirely to .ia-app so host-page styles are never touched ── */
.ia-app *,.ia-app *::before,.ia-app *::after{box-sizing:border-box}
.ia-app{
  --bg:#1e1e1e;--surface:#2c2c2e;--surface-2:#3a3a3c;--surface-3:#48484a;
  --border:rgba(84,84,88,0.65);--border-hover:rgba(142,142,147,0.8);
  --text:#ffffff;--text-muted:rgba(235,235,245,0.60);--text-dim:rgba(235,235,245,0.38);
  --accent:#5e5ce6;--accent-light:#7d7aff;--accent-dim:rgba(94,92,230,0.22);
  --c-screen:#bf5af2;--c-screen-bg:rgba(191,90,242,0.16);
  --c-modal:#0a84ff;--c-modal-bg:rgba(10,132,255,0.16);
  --c-overlay:#ff9f0a;--c-overlay-bg:rgba(255,159,10,0.16);
  --c-chrome:#8e8e93;--c-chrome-bg:rgba(142,142,147,0.18);
  --c-broken:#ff453a;--c-broken-bg:rgba(255,69,58,0.16);
  --c-state:#32d74b;--c-state-bg:rgba(50,215,75,0.16);
  --c-widget:#ff375f;--c-widget-bg:rgba(255,55,95,0.16);
  --warn:#ffd60a;--warn-bg:rgba(255,214,10,0.16);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:10px;--r-sm:6px;
  /* Layout */
  display:flex;flex-direction:column;
  min-height:680px;
  height:auto;
  /* Typography */
  font-family:var(--font);font-size:13px;line-height:1.5;
  color:var(--text);background:var(--bg);
  -webkit-font-smoothing:antialiased;
  border-radius:14px;
}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(8,8,14,0.97);backdrop-filter:blur(16px);flex-shrink:0;flex-wrap:wrap;z-index:10}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo svg{width:26px;height:26px}
.hdr-title{font-size:15px;font-weight:700;line-height:1.1;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.hdr-badge{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted)}

/* MAIN CONTAINER */
.main{display:flex;flex:1}

/* SITEMAP DIAGRAM VIEW */
.sm-view{flex:1;overflow-x:auto;padding:36px 28px;background:var(--bg);display:flex;flex-direction:column;align-items:center}
.sm-root-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:0}
.sm-root-box{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 36px;background:#2c2c2e;border:1px solid rgba(142,142,147,0.65);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:2;cursor:pointer;transition:all .15s}
.sm-root-box:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(0,0,0,0.6);border-color:#fff}
.sm-root-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.01em}
.sm-root-sub{font-size:11px;color:var(--text-muted)}
.sm-stem-top{width:2px;height:24px;background:rgba(142,142,147,0.4)}
.sm-tree-container{display:flex;flex-direction:column;align-items:center;position:relative;min-width:max-content}
.sm-columns{display:flex;gap:18px;position:relative;padding-top:24px}
.sm-bus-bar{position:absolute;top:0;left:80px;right:80px;height:2px;background:rgba(142,142,147,0.4)}
.sm-col{display:flex;flex-direction:column;align-items:center;width:155px;flex-shrink:0;position:relative}
.sm-col-stem-in{position:absolute;top:-24px;width:2px;height:24px;background:rgba(142,142,147,0.4)}
.sm-hdr-card{width:100%;padding:12px 10px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;text-align:center;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.4);transition:all .15s;display:flex;flex-direction:column;gap:4px;align-items:center;border:1px solid rgba(84,84,88,0.65)}
.sm-hdr-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.55);border-color:rgba(142,142,147,0.9)}
.sm-hdr-card.selected{outline:2px solid #5e5ce6;outline-offset:2px}
.sm-route-tag{font-family:var(--mono);font-size:10px;opacity:0.85;font-weight:500}
.sm-children{display:flex;flex-direction:column;width:100%;position:relative;padding-top:16px;gap:10px}
.sm-col-stem-down{position:absolute;top:0;bottom:16px;left:50%;width:2px;background:rgba(142,142,147,0.25);transform:translateX(-50%)}
.sm-child-wrap{position:relative;display:flex;align-items:center;width:100%;z-index:1}
.sm-child-card{width:100%;padding:10px 11px;background:#2c2c2e;border:1px solid rgba(84,84,88,0.65);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;flex-direction:column;gap:3px;align-items:center}
.sm-child-card:hover{background:#3a3a3c;border-color:rgba(142,142,147,0.8);transform:translateY(-1px);color:#fff}
.sm-child-card.selected{border-color:#5e5ce6;background:rgba(94,92,230,0.25);color:#fff}
.sm-child-sub{font-size:9px;color:var(--text-dim);font-weight:400;line-height:1.2}
.sm-c-cyan{background:#26262a;border-top:3px solid #64d2ff}
.sm-c-blue{background:#26262a;border-top:3px solid #0a84ff}
.sm-c-teal{background:#26262a;border-top:3px solid #30d158}
.sm-c-green{background:#26262a;border-top:3px solid #32d74b}
.sm-c-purple{background:#26262a;border-top:3px solid #bf5af2}
.sm-c-indigo{background:#26262a;border-top:3px solid #5e5ce6}
.sm-c-amber{background:#26262a;border-top:3px solid #ff9f0a}
.sm-c-rose{background:#26262a;border-top:3px solid #ff375f}
.sm-child-card.c-screen{border-left:3px solid #bf5af2}
.sm-child-card.c-modal{border-left:3px solid #0a84ff}
.sm-child-card.c-overlay{border-left:3px solid #ff9f0a}
.sm-child-card.c-chrome{border-left:3px solid #8e8e93}
.sm-child-card.c-widget{border-left:3px solid #ff375f}

/* DETAIL PANEL */
.detail-panel{width:330px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;max-height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);padding:32px 20px;text-align:center}
.d-empty svg{opacity:.25}
.d-empty p{font-size:12px;line-height:1.7}
.d-content{padding:18px;display:flex;flex-direction:column;gap:16px}
.d-hdr{padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px}
.d-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.d-meta{display:flex;flex-wrap:wrap;gap:5px}
.d-trigger{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.5}
.d-sec{display:flex;flex-direction:column;gap:7px}
.d-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
.ep-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--border);font-size:12px;color:var(--text);line-height:1.5}
.ep-item.sole{border-color:rgba(245,158,11,0.3);background:var(--warn-bg)}
.ep-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-light);flex-shrink:0;margin-top:5px}
.ep-dot.sole{background:var(--warn)}
.note-card{padding:9px 11px;background:var(--warn-bg);border:1px solid rgba(245,158,11,0.2);border-radius:var(--r-sm);font-size:12px;color:var(--warn);line-height:1.6;display:flex;gap:8px}
.note-card.err{background:var(--c-broken-bg);border-color:rgba(220,38,38,0.25);color:var(--c-broken)}
.note-card.info{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);color:var(--accent-light)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.b-screen{background:var(--c-screen-bg);color:#a78bfa;border:1px solid rgba(124,58,237,0.25)}
.b-modal{background:var(--c-modal-bg);color:#60a5fa;border:1px solid rgba(2,132,199,0.25)}
.b-overlay{background:var(--c-overlay-bg);color:#fbbf24;border:1px solid rgba(217,119,6,0.25)}
.b-chrome{background:var(--c-chrome-bg);color:#94a3b8;border:1px solid rgba(71,85,105,0.3)}
.b-broken{background:var(--c-broken-bg);color:#f87171;border:1px solid rgba(220,38,38,0.3)}
.b-state{background:var(--c-state-bg);color:#34d399;border:1px solid rgba(5,150,105,0.3)}
.b-widget{background:var(--c-widget-bg);color:#e879f9;border:1px solid rgba(192,38,211,0.3)}
.b-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(245,158,11,0.3)}
.rbadge{font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--surface-3);padding:1px 7px;border-radius:var(--r-sm);border:1px solid var(--border);flex-shrink:0}
.rbadge.err{color:var(--c-broken);border-color:rgba(220,38,38,0.3);background:var(--c-broken-bg)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:10px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

@media(max-width:760px){.ia-app .detail-panel{display:none}}
</style>
</head>
<body>

<div class="ia-app" id="ia-app">
<header class="hdr">
  <div class="hdr-logo">
    <svg viewBox="0 0 26 26" fill="none">
      <rect width="26" height="26" rx="7" fill="#6366f1"/>
      <path d="M7 13h12M13 7v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="hdr-title">Gamelog Information Architecture</div>
      <div class="hdr-sub">Interactive Sitemap Diagram · Click any box to inspect node details</div>
    </div>
  </div>
  <div class="hdr-badge">All 25 Flagged Issues Resolved</div>
</header>

<div class="main" id="main"></div>

<footer class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Screen (route)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#60a5fa"></div>Modal</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fbbf24"></div>Overlay</div>
  <div class="leg-item"><div class="leg-dot" style="background:#94a3b8"></div>Persistent Chrome</div>
  <div class="leg-item"><div class="leg-dot" style="background:#e879f9"></div>Widget</div>
</footer>
</div>

<script>

  type:'chrome',depth:0,
  children:[
    { id:'sidebar',label:'Sidebar',trigger:'8 navigation links + "Add game" button',type:'chrome',depth:0,
      children:[
        { id:'library',label:'Library',route:'/',type:'screen',depth:1,
          children:[
            { id:'lib-gd',label:'Game Detail',trigger:'click a cover or row',route:'/game/:igdbId',type:'screen',depth:2,

        },

          children:[
            { id:'dyn-list',label:'(dynamic list name)',trigger:'click a list card',

          ]
        },
        { id:'systems',label:'Browse Systems',trigger:'On-screen header: "Browse by System"',route:'/systems',type:'screen',depth:1,
          children:[
            { id:'platform',label:'(platform, e.g. "Xbox Series X")',trigger:'click a platform tile',route:'/systems/:platformId',type:'screen',depth:2,
              children:[
                { id:'plat-gd',label:'Game Detail',trigger:'click a cover/row',route:'/game/:igdbId',type:'screen',depth:3,children:[] },
                { id:'plat-log',label:'Log Editor',trigger:'quick "Log" action',type:'modal',depth:3,children:[] }
              ]
            }
          ]
        },
        { id:'recommend',label:'What to Play',trigger:'On-screen header: "What to Play Next"',route:'/recommend',type:'screen',depth:1,
          children:[
            { id:'roulette',label:'Backlog Roulette',trigger:'"Spin Backlog Roulette" button',type:'modal',depth:2,children:[] },
            { id:'rec-gd',label:'Game Detail',trigger:'"Start Playing" on a recommendation',route:'/game/:igdbId',type:'screen',depth:2,children:[] }
          ]
        },
        { id:'activity',label:'Activity',trigger:'On-screen header: "Activity & Milestones"',route:'/activity',type:'screen',depth:1,
          children:[

        { id:'friends',label:'Friends',trigger:'On-screen header: "Compare Libraries"',route:'/friends',type:'screen',depth:1,
          note:'Now fully clickable — covers trigger onOpenGame to view Game Detail.',children:[]
        },
        { id:'stats',label:'Stats',route:'/stats',type:'screen',depth:1,
          note:'Leaf node — no outbound navigation of any kind.',children:[]

    },
    { id:'cmdpal',label:'Command Palette',trigger:'⌘K / Ctrl+K or "/" when focus is not in a text field — keyboard only, no visible button',type:'overlay',depth:0,
      children:[
        { id:'cp-lib',label:'Library',trigger:'Command Palette nav item',route:'/library',type:'screen',depth:1,children:[] },
        { id:'cp-wtp',label:'What to Play',trigger:'Command Palette nav item',route:'/what-to-play',type:'screen',depth:1,children:[] },
        { id:'cp-roul',label:'Spin Backlog Roulette',trigger:'Command Palette action',route:'/what-to-play',type:'modal',depth:1,children:[] },
        { id:'cp-add',label:'Add Game',trigger:'"Add New Game to Library" action',type:'modal',depth:1,children:[] }
      ]
    }
  ]
};

const GLOBAL_NODES = [
  { id:'debug',label:'Store Diagnostic Check',trigger:'Direct URL only — no links anywhere in the UI',route:'/debug',type:'screen',depth:'global',sole:true,
    note:'Clears local database as part of self-running test.',
    children:[]
  }
];

const EP = {
  library:{ entries:[{t:'Sidebar "Library" link'},{t:'Logo click in header'},{t:'Default root route (/)'}] },
  lists:{ entries:[{t:'Sidebar "Lists" link'}] },
  recommend:{ entries:[{t:'Sidebar "What to play" link'}] },
  activity:{ entries:[{t:'Sidebar "Activity" link'}] },
  friends:{ entries:[{t:'Sidebar "Friends" link'}] },
  systems:{ entries:[{t:'Sidebar "Browse Systems" link'}] },
  platform:{ entries:[{t:'Click a platform tile from Browse by System',sole:true}] },

  steam:{ entries:[{t:'Settings → Platform Integrations → Steam tab → "Fetch from Steam"',sole:true}] },
  debug:{ entries:[{t:'Direct URL entry (/debug) — no UI links anywhere in the app',sole:true}] },
  search:{ entries:[{t:'Press Enter in the Global Search widget with a non-empty query',sole:true}] },
  _gameDetail:{ entries:[

    {t:'Click a cover or row on Search Results'},

    {t:"Click a game in a List's contents"},
    {t:'Click a game in the Activity Timeline tab'},
    {t:'Click an item on the Related Games page'},
    {t:'Click the Spotlight Banner on Library'},
    {t:'Click a result row in the Global Search dropdown'},
    {t:'Click a game in the Command Palette "Library Games" results'},
    {t:'"Start Playing" from a What to Play Next recommendation'}
  ]},
  'gd-related':{ entries:[{t:'From Game Detail: click a "see all" style button for the active related-content tab'},{t:'From Game Detail: click a "Series" value chip'}] },
  _logEditor:{ entries:[
    {t:'Quick "Log" action on Library'},
    {t:'Quick "Log" action on Search Results'},
    {t:'Quick "Log" action on Browse by System'},
    {t:'"Log" button on Game Detail'},
    {t:'Automatically opened after adding a game via the Global Search widget\'s "+" button'}
  ]},
  'gd-atl':{ entries:[{t:'"Add to list" button on Game Detail',sole:true}] },
  _share:{ entries:[{t:'Library toolbar "Share" button'},{t:"A specific List's toolbar \"Share\" button"}] },

  cmdpal:{ entries:[{t:'⌘K or Ctrl+K'},{t:'"/" when focus is not in a text field'}] },
  'global-search':{ entries:[{t:'Always visible on every screen except Search Results'}] }
};

const EP_ALIASES = {
  'lib-gd':'_gameDetail','list-gd':'_gameDetail','plat-gd':'_gameDetail','rec-gd':'_gameDetail','act-gd':'_gameDetail',
  'gd-log':'_logEditor','lib-log':'_logEditor','plat-log':'_logEditor',
  'lib-share':'_share','list-share':'_share',
  'add-game':'_addGame','cp-add':'_addGame',
  'cp-lib':'cp-lib','cp-wtp':'cp-wtp','cp-roul':'cp-roul'
};

const TYPE_BADGE = {
  screen:'b-screen',modal:'b-modal',overlay:'b-overlay',chrome:'b-chrome',state:'b-state',widget:'b-widget'
};
const TYPE_LABEL = {
  screen:'Screen',modal:'Modal',overlay:'Overlay',chrome:'Chrome',state:'State view',widget:'Widget'
};

function findNodeById(root, id) {
  if (root.id === id) return root;
  if (root.children) {
    for (const c of root.children) {
      const f = findNodeById(c, id);
      if (f) return f;
    }
  }
  return null;
}

function selectNode(id) {
  selectedId = id;
  render();
  setTimeout(() => {
    const dp = document.getElementById('detail-panel');
    if (dp) dp.scrollTop = 0;
  }, 0);
}

function renderSitemap() {
  const smCols = [
    {
      title: 'Library',

      children: [

    {

      children: [

        { title: 'Game in List Detail', sub: 'Click game cover', id: 'list-gd', type: 'screen' },
        { title: 'Share Custom List', sub: 'List toolbar share', id: 'list-share', type: 'modal' }
      ]
    },
    {
      title: 'Browse Systems',
      route: '/systems',
      id: 'systems',
      theme: 'sm-c-teal',
      children: [
        { title: 'Platform Filter Page', sub: '/systems/:platformId', id: 'platform', type: 'screen' },
        { title: 'Platform Game Detail', sub: 'Click platform cover', id: 'plat-gd', type: 'screen' },
        { title: 'Platform Log Action', sub: 'Quick log CTA', id: 'plat-log', type: 'modal' }
      ]
    },
    {
      title: 'What to Play',
      route: '/recommend',
      id: 'recommend',
      theme: 'sm-c-green',
      children: [
        { title: 'Backlog Roulette', sub: 'Spin Roulette Modal', id: 'roulette', type: 'modal' },
        { title: 'Recommended Game', sub: 'Start Playing CTA', id: 'rec-gd', type: 'screen' }
      ]
    },
    {
      title: 'Activity',
      route: '/activity',
      id: 'activity',
      theme: 'sm-c-purple',
      children: [
        { title: 'Year in Review Modal', sub: 'Wrapped slides (⌘K)', id: 'yir', type: 'modal' },
        { title: 'Timeline Game Detail', sub: 'Click journal event', id: 'act-gd', type: 'screen' }
      ]
    },
    {
      title: 'Friends',
      route: '/friends',
      id: 'friends',
      theme: 'sm-c-indigo',
      children: [
        { title: 'Compare Libraries', sub: 'Clickable covers → /game', id: 'friends', type: 'screen' }
      ]
    },
    {
      title: 'Stats & Settings',
      route: '/stats · /settings',
      id: 'stats',
      theme: 'sm-c-amber',
      children: [
        { title: 'Stats Dashboard', sub: '/stats screen', id: 'stats', type: 'screen' },
        { title: 'Settings Screen', sub: '/settings screen', id: 'settings', type: 'screen' },
        { title: 'Steam Import Review', sub: '/import/steam (2-deep)', id: 'steam', type: 'screen' },
        { title: 'Store Diagnostic', sub: '/debug (confirmed wipe)', id: 'debug', type: 'screen' }
      ]
    },
    {
      title: 'Search & Command',
      route: 'Global · ⌘K Palette',
      id: 'global-search',
      theme: 'sm-c-rose',
      children: [
        { title: 'Global Search Widget', sub: 'Top-right IGDB Catalog', id: 'global-search', type: 'widget' },
        { title: 'Search Results Page', sub: '/search (Press Enter)', id: 'search', type: 'screen' },
        { title: 'Command Palette (⌘K)', sub: 'Library search & Actions', id: 'cmdpal', type: 'overlay' }
      ]
    }
  ];

  return `
    <div class="sm-view">
      <div class="sm-tree-container">
        <div class="sm-root-wrap">
          <div class="sm-root-box" onclick="selectNode('sidebar')">
            <div class="sm-root-title">Gamelog Information Architecture</div>
            <div class="sm-root-sub">Root Application Shell · App.tsx · All boxes interactive</div>
          </div>
          <div class="sm-stem-top"></div>
        </div>
        <div class="sm-columns">
          <div class="sm-bus-bar"></div>
          ${smCols.map(c => `
            <div class="sm-col">
              <div class="sm-col-stem-in"></div>
              <div class="sm-hdr-card ${c.theme} ${selectedId === c.id ? 'selected' : ''}" onclick="selectNode('${c.id}')">
                <div>${c.title}</div>
                <div class="sm-route-tag">${c.route}</div>
              </div>
              <div class="sm-children">
                <div class="sm-col-stem-down"></div>
                ${c.children.map(ch => `
                  <div class="sm-child-wrap">
                    <div class="sm-child-card c-${ch.type} ${selectedId === ch.id ? 'selected' : ''}" onclick="selectNode('${ch.id}')">
                      <div>${ch.title}</div>
                      <div class="sm-child-sub">${ch.sub}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderDetail() {
  if (!selectedId) {
    return `
      <div class="d-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <p>Click any node in the sitemap diagram to inspect entry points, routes, and architectural details.</p>
      </div>`;
  }

  let n = findNodeById(TREE, selectedId);
  if (!n) {
    n = GLOBAL_NODES.find(x => x.id === selectedId);
  }
  if (!n) {
    return `<div class="d-empty"><p>Node details for "${selectedId}"</p></div>`;
  }

  const bc = TYPE_BADGE[n.type] || 'b-chrome';
  const bl = TYPE_LABEL[n.type] || n.type;
  const epKey = EP_ALIASES[n.id] || n.id;
  const epData = EP[epKey];

  let html = `<div class="d-content">
    <div class="d-hdr">
      <div class="d-name">${n.label}</div>
      <div class="d-meta">
        <span class="badge ${bc}">${bl}</span>
        ${n.route ? `<span class="rbadge">${n.route}</span>` : ''}
        ${n.sole ? `<span class="badge b-warn">⚠ Sole Entry</span>` : ''}
      </div>
      ${(n.trigger || n.sub) ? `<div class="d-trigger">${n.trigger || n.sub}</div>` : ''}
    </div>`;

  if (epData && epData.entries && epData.entries.length > 0) {
    html += `<div class="d-sec">
      <div class="d-sec-title">How Users Reach This Node (${epData.entries.length})</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${epData.entries.map(e => `
          <div class="ep-item${e.sole ? ' sole' : ''}">
            <div class="ep-dot${e.sole ? ' sole' : ''}"></div>
            <div>${e.t}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (n.note) {
    html += `<div class="d-sec">
      <div class="d-sec-title">Architecture & Design Note</div>
      <div class="note-card info">${n.note}</div>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = `
    ${renderSitemap()}
    <div class="detail-panel" id="detail-panel">${renderDetail()}</div>
  `;
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamelog — Information Architecture</title>
<meta name="description" content="Interactive Information Architecture map for the Gamelog app — screens, navigation hierarchy, entry points, and flagged issues.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Embed: <iframe src="ia.html" width="100%" height="820" frameborder="0" style="border-radius:12px"></iframe> -->

<style>
/* ── Scoped entirely to .ia-app so host-page styles are never touched ── */
.ia-app *,.ia-app *::before,.ia-app *::after{box-sizing:border-box}
.ia-app{
  --bg:#1e1e1e;--surface:#2c2c2e;--surface-2:#3a3a3c;--surface-3:#48484a;
  --border:rgba(84,84,88,0.65);--border-hover:rgba(142,142,147,0.8);
  --text:#ffffff;--text-muted:rgba(235,235,245,0.60);--text-dim:rgba(235,235,245,0.38);
  --accent:#5e5ce6;--accent-light:#7d7aff;--accent-dim:rgba(94,92,230,0.22);
  --c-screen:#bf5af2;--c-screen-bg:rgba(191,90,242,0.16);
  --c-modal:#0a84ff;--c-modal-bg:rgba(10,132,255,0.16);
  --c-overlay:#ff9f0a;--c-overlay-bg:rgba(255,159,10,0.16);
  --c-chrome:#8e8e93;--c-chrome-bg:rgba(142,142,147,0.18);
  --c-broken:#ff453a;--c-broken-bg:rgba(255,69,58,0.16);
  --c-state:#32d74b;--c-state-bg:rgba(50,215,75,0.16);
  --c-widget:#ff375f;--c-widget-bg:rgba(255,55,95,0.16);
  --warn:#ffd60a;--warn-bg:rgba(255,214,10,0.16);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:10px;--r-sm:6px;
  /* Layout */
  display:flex;flex-direction:column;
  min-height:720px;
  height:auto;
  /* Typography */
  font-family:var(--font);font-size:13px;line-height:1.5;
  color:var(--text);background:var(--bg);
  -webkit-font-smoothing:antialiased;
  border-radius:14px;
}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);background:rgba(8,8,14,0.97);backdrop-filter:blur(16px);flex-shrink:0;flex-wrap:wrap;z-index:10}
.hdr-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.hdr-logo svg{width:26px;height:26px}
.hdr-title{font-size:14px;font-weight:700;line-height:1.1}
.hdr-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.hdiv{width:1px;height:26px;background:var(--border);flex-shrink:0}
.tabs{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:calc(var(--r) + 2px);padding:3px}
.tab{padding:4px 13px;border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.hdr-btns{display:flex;gap:6px;margin-left:auto}
.btn{padding:4px 11px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--border-hover);color:var(--text)}

/* STATS STRIP */
.stats-strip{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.stat{display:flex;flex-direction:column;align-items:center;padding:8px 20px;border-right:1px solid var(--border);gap:1px}
.stat:last-child{border-right:none}
.stat-val{font-size:17px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}

/* MAIN */
.main{display:flex;flex:1}

/* TREE */
.tree-panel{flex:1;padding:16px 18px}
.tree-panel::-webkit-scrollbar{width:5px}
.tree-panel::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.tree-root{display:flex;flex-direction:column;gap:2px}
.node-wrap{position:relative}
.node{display:flex;align-items:flex-start;gap:7px;padding:6px 9px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:background .1s,border-color .1s}
.node:hover{background:var(--surface-2)}
.node.selected{background:var(--accent-dim);border-color:rgba(99,102,241,0.3)}
.node.broken-node .node-label{color:var(--c-broken)}
.node.expanded .ntog{transform:rotate(90deg)}
.ntog{flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:9px;margin-top:2px;transition:transform .15s;user-select:none}
.ntog.leaf{cursor:default}
.ncontent{flex:1;min-width:0}
.nhead{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.node-label{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.ntrigger{font-size:11px;color:var(--text-dim);margin-top:2px;font-style:italic}
.nnote{font-size:11px;color:var(--warn);margin-top:3px;line-height:1.5}
.nnote.err{color:var(--c-broken)}
.node-children{margin-left:24px;padding-left:12px;border-left:1px solid var(--border);margin-top:2px;display:flex;flex-direction:column;gap:2px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.b-screen{background:var(--c-screen-bg);color:#a78bfa;border:1px solid rgba(124,58,237,0.25)}
.b-modal{background:var(--c-modal-bg);color:#60a5fa;border:1px solid rgba(2,132,199,0.25)}
.b-overlay{background:var(--c-overlay-bg);color:#fbbf24;border:1px solid rgba(217,119,6,0.25)}
.b-chrome{background:var(--c-chrome-bg);color:#94a3b8;border:1px solid rgba(71,85,105,0.3)}
.b-broken{background:var(--c-broken-bg);color:#f87171;border:1px solid rgba(220,38,38,0.3)}
.b-state{background:var(--c-state-bg);color:#34d399;border:1px solid rgba(5,150,105,0.3)}
.b-widget{background:var(--c-widget-bg);color:#e879f9;border:1px solid rgba(192,38,211,0.3)}
.b-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(245,158,11,0.3)}
.rbadge{font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--surface-3);padding:1px 7px;border-radius:var(--r-sm);border:1px solid var(--border);flex-shrink:0}
.rbadge.err{color:var(--c-broken);border-color:rgba(220,38,38,0.3);background:var(--c-broken-bg)}

/* DEPTH SECTION HEADERS */
.depth-hdr{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;padding:14px 9px 5px;display:flex;align-items:center;gap:8px}
.depth-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.global-section{margin-top:20px;padding-top:2px;border-top:1px dashed rgba(255,255,255,0.06)}

/* DETAIL PANEL */
.detail-panel{width:330px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;max-height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);padding:32px 20px;text-align:center}
.d-empty svg{opacity:.25}
.d-empty p{font-size:12px;line-height:1.7}
.d-content{padding:18px;display:flex;flex-direction:column;gap:16px}
.d-hdr{padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px}
.d-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.d-meta{display:flex;flex-wrap:wrap;gap:5px}
.d-trigger{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.5}
.d-sec{display:flex;flex-direction:column;gap:7px}
.d-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
.ep-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--border);font-size:12px;color:var(--text);line-height:1.5}
.ep-item.sole{border-color:rgba(245,158,11,0.3);background:var(--warn-bg)}
.ep-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-light);flex-shrink:0;margin-top:5px}
.ep-dot.sole{background:var(--warn)}
.note-card{padding:9px 11px;background:var(--warn-bg);border:1px solid rgba(245,158,11,0.2);border-radius:var(--r-sm);font-size:12px;color:var(--warn);line-height:1.6;display:flex;gap:8px}
.note-card.err{background:var(--c-broken-bg);border-color:rgba(220,38,38,0.25);color:var(--c-broken)}
.note-card.info{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);color:var(--accent-light)}

/* INVENTORY */
.inv-view{flex:1;display:flex;flex-direction:column}
.inv-filters{display:flex;gap:7px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filt-btn{padding:4px 13px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .15s}
.filt-btn:hover{color:var(--text);border-color:var(--border-hover)}
.filt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.inv-wrap{flex:1}
.inv-wrap::-webkit-scrollbar{width:5px}
.inv-wrap::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.ia-app table{width:100%;border-collapse:collapse}
.ia-app thead th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);padding:10px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.ia-app tbody tr{border-bottom:1px solid rgba(255,255,255,0.035);transition:background .1s}
.ia-app tbody tr:hover{background:var(--surface-2)}
.ia-app tbody td{padding:9px 14px;font-size:13px;vertical-align:top}
.td-n{color:var(--text-dim);font-size:12px;padding-right:6px}
.td-route{font-family:var(--mono);font-size:11px;color:var(--text-muted)}
.td-desc{font-size:12px;color:var(--text-muted);line-height:1.55}

/* ISSUES */
.iss-view{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.iss-view::-webkit-scrollbar{width:5px}
.iss-view::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.iss-group{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.iss-ghdr{display:flex;align-items:center;gap:9px;padding:11px 14px;background:var(--surface-2);cursor:pointer;user-select:none;transition:background .1s}
.iss-ghdr:hover{background:var(--surface-3)}
.iss-gicon{font-size:14px;flex-shrink:0}
.iss-gtitle{font-size:13px;font-weight:600;color:var(--text);flex:1}
.iss-cnt{font-size:11px;color:var(--text-dim);background:var(--surface-3);padding:1px 8px;border-radius:999px;border:1px solid var(--border)}
.iss-chev{font-size:9px;color:var(--text-dim);transition:transform .15s;flex-shrink:0}
.iss-group.open .iss-chev{transform:rotate(90deg)}
.iss-gbody{display:none;flex-direction:column;gap:1px;background:var(--border)}
.iss-group.open .iss-gbody{display:flex}
.iss-item{padding:11px 14px;background:var(--surface);display:flex;flex-direction:column;gap:5px}
.iss-ilbl{font-size:13px;font-weight:500;color:var(--text)}
.iss-idesc{font-size:12px;color:var(--text-muted);line-height:1.6}
.sev-high{display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--c-broken-bg);color:var(--c-broken);border:1px solid rgba(220,38,38,0.3);align-self:flex-start}
.sev-resolved{display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--c-state-bg);color:var(--c-state);border:1px solid rgba(5,150,105,0.3);align-self:flex-start}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:9px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* SITEMAP DIAGRAM VIEW */
.sm-view{flex:1;overflow-x:auto;padding:36px 28px;background:var(--bg);display:flex;flex-direction:column;align-items:center}
.sm-root-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:0}
.sm-root-box{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 36px;background:#2c2c2e;border:1px solid rgba(142,142,147,0.65);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:2;cursor:pointer;transition:all .15s}
.sm-root-box:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(0,0,0,0.6);border-color:#fff}
.sm-root-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.01em}
.sm-root-sub{font-size:11px;color:var(--text-muted)}
.sm-stem-top{width:2px;height:24px;background:rgba(142,142,147,0.4)}
.sm-tree-container{display:flex;flex-direction:column;align-items:center;position:relative;min-width:max-content}
.sm-columns{display:flex;gap:18px;position:relative;padding-top:24px}
.sm-bus-bar{position:absolute;top:0;left:80px;right:80px;height:2px;background:rgba(142,142,147,0.4)}
.sm-col{display:flex;flex-direction:column;align-items:center;width:155px;flex-shrink:0;position:relative}
.sm-col-stem-in{position:absolute;top:-24px;width:2px;height:24px;background:rgba(142,142,147,0.4)}
.sm-hdr-card{width:100%;padding:12px 10px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;text-align:center;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.4);transition:all .15s;display:flex;flex-direction:column;gap:4px;align-items:center;border:1px solid rgba(84,84,88,0.65)}
.sm-hdr-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.55);border-color:rgba(142,142,147,0.9)}
.sm-hdr-card.selected{outline:2px solid #5e5ce6;outline-offset:2px}
.sm-route-tag{font-family:var(--mono);font-size:10px;opacity:0.85;font-weight:500}
.sm-children{display:flex;flex-direction:column;width:100%;position:relative;padding-top:16px;gap:10px}
.sm-col-stem-down{position:absolute;top:0;bottom:16px;left:50%;width:2px;background:rgba(142,142,147,0.25);transform:translateX(-50%)}
.sm-child-wrap{position:relative;display:flex;align-items:center;width:100%;z-index:1}
.sm-child-card{width:100%;padding:10px 11px;background:#2c2c2e;border:1px solid rgba(84,84,88,0.65);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;flex-direction:column;gap:3px;align-items:center}
.sm-child-card:hover{background:#3a3a3c;border-color:rgba(142,142,147,0.8);transform:translateY(-1px);color:#fff}
.sm-child-card.selected{border-color:#5e5ce6;background:rgba(94,92,230,0.25);color:#fff}
.sm-child-sub{font-size:9px;color:var(--text-dim);font-weight:400;line-height:1.2}
.sm-c-cyan{background:#26262a;border-top:3px solid #64d2ff}
.sm-c-blue{background:#26262a;border-top:3px solid #0a84ff}
.sm-c-teal{background:#26262a;border-top:3px solid #30d158}
.sm-c-green{background:#26262a;border-top:3px solid #32d74b}
.sm-c-purple{background:#26262a;border-top:3px solid #bf5af2}
.sm-c-indigo{background:#26262a;border-top:3px solid #5e5ce6}
.sm-c-amber{background:#26262a;border-top:3px solid #ff9f0a}
.sm-c-rose{background:#26262a;border-top:3px solid #ff375f}
.sm-child-card.c-screen{border-left:3px solid #bf5af2}
.sm-child-card.c-modal{border-left:3px solid #0a84ff}
.sm-child-card.c-overlay{border-left:3px solid #ff9f0a}
.sm-child-card.c-chrome{border-left:3px solid #8e8e93}
.sm-child-card.c-widget{border-left:3px solid #ff375f}

.ia-app .hdr-title,.ia-app .node-label,.ia-app .d-name,.ia-app .iss-gtitle,.ia-app .iss-ilbl{color:var(--text)}
@media(max-width:760px){.ia-app .detail-panel{display:none}.ia-app .hdr-btns{display:none}}
</style>
</head>
<body>

<div class="ia-app" id="ia-app">
<header class="hdr">
  <div class="hdr-logo">
    <svg viewBox="0 0 26 26" fill="none">
      <rect width="26" height="26" rx="7" fill="#6366f1"/>
      <path d="M7 13h12M13 7v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="hdr-title">Gamelog</div>
      <div class="hdr-sub">Information Architecture · as-built</div>
    </div>
  </div>
  <div class="hdiv"></div>
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="setView('tree')" id="tab-tree">Navigation Tree</button>
    <button class="tab" onclick="setView('sitemap')" id="tab-sitemap">Visual Sitemap</button>
    <button class="tab" onclick="setView('inventory')" id="tab-inventory">Screen Inventory</button>
    <button class="tab" onclick="setView('issues')" id="tab-issues">⚑ Flagged Issues</button>
  </div>
  <div class="hdr-btns" id="tree-btns">
    <button class="btn" onclick="expandAll()">Expand all</button>
    <button class="btn" onclick="collapseAll()">Collapse all</button>
  </div>
</header>

<div class="stats-strip" id="stats-strip">
  <div class="stat"><div class="stat-val">15</div><div class="stat-lbl">Routed Screens</div></div>
  <div class="stat"><div class="stat-val">6</div><div class="stat-lbl">Modals / Sheets</div></div>
  <div class="stat"><div class="stat-val">2</div><div class="stat-lbl">Global Overlays</div></div>
  <div class="stat"><div class="stat-val">3</div><div class="stat-lbl">Broken Nav Links</div></div>
  <div class="stat"><div class="stat-val">25</div><div class="stat-lbl">Flagged Issues</div></div>
</div>

<div class="main" id="main"></div>

<div class="legend" id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#7c3aed"></div>Routed screen</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0284c7"></div>Modal / sheet</div>
  <div class="leg-item"><div class="leg-dot" style="background:#d97706"></div>Overlay (⌘K)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#c026d3"></div>Persistent widget</div>
  <div class="leg-item"><div class="leg-dot" style="background:#475569"></div>Navigation chrome</div>
  <div class="leg-item"><div class="leg-dot" style="background:#059669"></div>State-only (no URL)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#dc2626"></div>Broken navigation</div>
</div>
</div><!-- /.ia-app -->

<script>
// ═══════════════ DATA ═══════════════

const TREE = {
  id:'chrome',label:'Persistent Chrome',
  sub:'Sidebar · Global Search · Command Palette — present on every screen',
  type:'chrome',depth:0,
  children:[
    { id:'sidebar',label:'Sidebar',trigger:'8 navigation links + "Add game" button',type:'chrome',depth:0,
      children:[
        { id:'library',label:'Library',route:'/',type:'screen',depth:1,
          children:[
            { id:'lib-gd',label:'Game Detail',trigger:'click a cover or row',route:'/game/:igdbId',type:'screen',depth:2,
              children:[
                { id:'gd-related',label:'Related Games',trigger:'click "See all" / a related-value chip',route:'/game/:igdbId/related',type:'screen',depth:3,children:[] },
                { id:'gd-log',label:'Log Editor',trigger:'click "Log"',type:'modal',depth:3,children:[] },
                { id:'gd-atl',label:'Add to List',trigger:'click "Add to list"',type:'modal',depth:3,children:[] }
              ]
            },
            { id:'lib-log',label:'Log Editor',trigger:'quick "Log" action on a cover/row',type:'modal',depth:2,children:[] },
            { id:'lib-share',label:'Share',trigger:'toolbar "Share" button',type:'modal',depth:2,children:[] }
          ]
        },
        { id:'lists',label:'Lists',route:'/lists',type:'screen',depth:1,
          children:[
            { id:'dyn-list',label:'(dynamic list name)',trigger:'click a list card',
              note:'No URL — local useState in App.tsx. Refreshing the page returns to the list-of-lists screen. The on-screen back arrow resets state rather than using browser history.',

function findNode(tree, id) {
  if (tree.id === id) return tree;
  if (tree.children) for (const c of tree.children) { const f = findNode(c,id); if(f) return f; }
  return null;
}
function collectIds(tree) {
  const ids = [tree.id];
  if (tree.children) for (const c of tree.children) ids.push(...collectIds(c));
  return ids;
}
function getEP(id) {
  const alias = EP_ALIASES[id];
  const key = alias || id;
  return EP[key] || null;
}

function render() {
  const main = document.getElementById('main');
  const legend = document.getElementById('legend');
  const treeBtns = document.getElementById('tree-btns');
  const statsStrip = document.getElementById('stats-strip');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+view).classList.add('active');

  if (view === 'tree') {
    legend.style.display = 'flex';
    treeBtns.style.display = 'flex';
    statsStrip.style.display = 'flex';
    main.innerHTML = `
      <div class="tree-panel" id="tree-panel">
        <div class="tree-root">
          ${renderNode(TREE, 0)}
          <div class="global-section">
            <div class="depth-hdr">Depth "Global" — not part of the Sidebar tree</div>
            ${GLOBAL_NODES.map(n => renderNode(n, 0)).join('')}
          </div>
        </div>
      </div>
      <div class="detail-panel" id="detail-panel">${renderDetail()}</div>`;
  } else if (view === 'sitemap') {
    legend.style.display = 'flex';
    treeBtns.style.display = 'none';
    statsStrip.style.display = 'flex';
    main.innerHTML = `
      ${renderSitemap()}
      <div class="detail-panel" id="detail-panel">${renderDetail()}</div>`;
  } else if (view === 'inventory') {
    legend.style.display = 'none';
    treeBtns.style.display = 'none';
    statsStrip.style.display = 'flex';
    main.innerHTML = renderInventory();
  } else {
    legend.style.display = 'none';
    treeBtns.style.display = 'none';
    statsStrip.style.display = 'none';
    main.innerHTML = renderIssues();
  }
}

function renderNode(n, indent) {
  const hasKids = n.children && n.children.length > 0;
  const isExp = expanded.has(n.id);
  const isSel = n.id === selectedId;

  const toggle = hasKids
    ? `<div class="ntog">▶</div>`
    : `<div class="ntog leaf" style="opacity:.25">—</div>`;

  const bc = TYPE_BADGE[n.type] || 'b-chrome';
  const bl = TYPE_LABEL[n.type] || n.type;
  const routeHtml = n.route ? `<span class="rbadge${n.type==='broken'?' err':''}">${n.route}</span>` : '';
  const soleHtml = n.sole ? `<span class="badge b-warn" style="font-size:9px">⚠ Sole entry</span>` : '';

  const triggerHtml = (n.trigger || n.sub)
    ? `<div class="ntrigger">${n.trigger || n.sub}</div>` : '';

  const noteHtml = n.brokenNote
    ? `<div class="nnote err">🔴 ${n.brokenNote}</div>`
    : n.note ? `<div class="nnote">⚠ ${n.note}</div>` : '';

  const kidsHtml = hasKids && isExp
    ? `<div class="node-children">${n.children.map(c => renderNode(c, indent+1)).join('')}</div>` : '';

  let cls = 'node';
  if (isSel) cls += ' selected';
  if (isExp && hasKids) cls += ' expanded';
  if (n.type === 'broken') cls += ' broken-node';

  return `<div class="node-wrap" id="nw-${n.id}">
    <div class="${cls}" onclick="nodeClick('${n.id}',${hasKids})">
      ${toggle}
      <div class="ncontent">
        <div class="nhead">
          <span class="badge ${bc}">${bl}</span>
          <span class="node-label">${n.label}</span>
          ${routeHtml}${soleHtml}
        </div>
        ${triggerHtml}${noteHtml}
      </div>
    </div>
    ${kidsHtml}
  </div>`;
}

function renderDetail() {
  if (!selectedId) return `
    <div class="d-empty">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="17" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="M19 11v8M19 24v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>Click any node in the tree to see its entry points and details here.</p>
    </div>`;

  const n = findNode(TREE, selectedId) || GLOBAL_NODES.find(x => x.id === selectedId);
  if (!n) return '<div class="d-empty"><p>Node not found.</p></div>';

  const ep = getEP(selectedId);

  const metaHtml = `<div class="d-meta">
    <span class="badge ${TYPE_BADGE[n.type]||'b-chrome'}">${TYPE_FULL[n.type]||n.type}</span>
    ${n.route ? `<span class="rbadge${n.type==='broken'?' err':''}">${n.route}</span>` : ''}
    ${n.sole ? `<span class="badge b-warn">⚠ Sole entry</span>` : ''}
  </div>`;

  const trigHtml = n.trigger ? `<div class="d-trigger">Via: ${n.trigger}</div>` : '';

  let noteSec = '';
  if (n.brokenNote) {
    noteSec = `<div class="d-sec"><div class="d-sec-title">Known Issue</div>
      <div class="note-card err"><span>🔴</span><span>${n.brokenNote}</span></div></div>`;
  } else if (n.note) {
    noteSec = `<div class="d-sec"><div class="d-sec-title">Note</div>
      <div class="note-card"><span>⚠</span><span>${n.note}</span></div></div>`;
  }

  let epSec = '';
  if (ep) {
    const items = ep.entries.map(e => `
      <div class="ep-item${e.sole?' sole':''}">
        <div class="ep-dot${e.sole?' sole':''}"></div>
        <span>${e.t}${e.sole?' <strong>(sole entry point)</strong>':''}</span>
      </div>`).join('');
    const epNote = ep.note ? `<div class="note-card info" style="margin-top:4px"><span>ℹ</span><span>${ep.note}</span></div>` : '';
    epSec = `<div class="d-sec">
      <div class="d-sec-title">All Entry Points (${ep.entries.length})</div>
      ${items}${epNote}
    </div>`;
  } else if (n.type !== 'chrome') {
    epSec = `<div class="d-sec"><div class="d-sec-title">Entry Points</div>
      <div class="ep-item"><div class="ep-dot"></div><span>See trigger in the parent node above</span></div>
    </div>`;
  }

  return `<div class="d-content">
    <div class="d-hdr">
      <div class="d-name">${n.label}</div>
      ${metaHtml}${trigHtml}
    </div>
    ${noteSec}${epSec}
  </div>`;
}

function renderInventory() {
  const rows = invFilter === 'all' ? INVENTORY : INVENTORY.filter(r => r.type === invFilter);
  const counts = {screen:15,modal:6,overlay:1,widget:1};
  const filters = [
    {k:'all',l:`All (${INVENTORY.length})`},
    {k:'screen',l:`Screens (${counts.screen})`},
    {k:'modal',l:`Modals (${counts.modal})`},
    {k:'overlay',l:`Overlays (${counts.overlay})`},
    {k:'widget',l:`Widgets (${counts.widget})`}
  ];

  const fhtml = filters.map(f =>
    `<button class="filt-btn${invFilter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.l}</button>`
  ).join('');

  const rhtml = rows.map(r => `<tr>
    <td class="td-n">${r.n}</td>
    <td><span class="badge ${TYPE_BADGE[r.type]||''}">${TYPE_LABEL[r.type]||r.type}</span></td>
    <td style="font-weight:500">${r.label}</td>
    <td class="td-route">${r.route}</td>
    <td class="td-desc">${r.desc}</td>
  </tr>`).join('');

  return `<div class="inv-view">
    <div class="inv-filters">${fhtml}</div>
    <div class="inv-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Type</th><th>UI Label</th><th>Route</th><th>Description</th>
        </tr></thead>
        <tbody>${rhtml}</tbody>
      </table>
    </div>
  </div>`;
}

function renderIssues() {
  const total = ISSUES.reduce((s,g) => s+g.items.length, 0);
  document.getElementById('tab-issues').textContent = `⚑ Flagged Issues (${total})`;

  const groups = ISSUES.map(g => {
    const items = g.items.map(item => `<div class="iss-item">
      ${item.sev==='high' ? '<span class="sev-high">High severity</span>' : item.sev==='resolved' ? '<span class="sev-resolved">Resolved</span>' : ''}
      <div class="iss-ilbl">${item.label}</div>
      <div class="iss-idesc">${item.desc}</div>
    </div>`).join('');

    return `<div class="iss-group${g.open?' open':''}" id="ig-${g.id}">
      <div class="iss-ghdr" onclick="toggleGroup('${g.id}')">
        <span class="iss-gicon">${g.icon}</span>
        <span class="iss-gtitle">${g.title}</span>
        <span class="iss-cnt">${g.items.length}</span>
        <span class="iss-chev">▶</span>
      </div>
      <div class="iss-gbody">${items}</div>
    </div>`;
  }).join('');

  return `<div class="iss-view">${groups}</div>`;
}

// ═══════════════ EVENTS ═══════════════

function nodeClick(id, hasKids) {
  if (hasKids) {
    if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
  }
  selectedId = id;
  render();
  setTimeout(() => {
    const dp = document.getElementById('detail-panel');
    if (dp) dp.scrollTop = 0;
  }, 0);
}

function setView(v) { view = v; render(); }
function setFilter(f) { invFilter = f; render(); }

function expandAll() {
  const ids = collectIds(TREE);
  GLOBAL_NODES.forEach(n => ids.push(...collectIds(n)));
  expanded = new Set(ids);
  render();
}

function collapseAll() {
  expanded = new Set();
  render();
}

function toggleGroup(id) {
  const el = document.getElementById('ig-'+id);
  if (el) el.classList.toggle('open');
}

render();
</script>

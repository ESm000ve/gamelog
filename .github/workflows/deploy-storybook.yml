name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main

# Only one deployment runs at a time; cancel any in-progress run for the same branch.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook
        env:
          # Disable Storybook telemetry in CI
          STORYBOOK_DISABLE_TELEMETRY: 1

      - name: Copy ia.html into Storybook output
        run: cp ia.html storybook-static/ia.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The folder storybook build outputs to (matches package.json default)
          path: storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
